
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#07090d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Perplexio" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/icon.png" />
  <title>Perplexio</title>

  <!-- Markdown & Code Highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root {
      --bg: #000000;
      --bg-soft: #0a0a0a;
      --panel: #121212;
      --panel-2: #1a1a1a;
      --line: #27272a;
      --ink: #e4e4e7;
      --muted: #a1a1aa;
      --accent: #ffffff;
      --accent-2: #f4f4f5;
      --error: #ef4444;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -4px rgba(0, 0, 0, 0.5);
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }
    .layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: 100vh;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--bg);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .brand {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin: 0 0 4px 0;
      color: #fafafa;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand svg { color: var(--ink) !important; }
    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    .panel {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .panel h3 {
      margin: 0;
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .btn-new-chat {
      background: var(--line);
      color: var(--ink);
      border: 1px solid transparent;
      border-radius: 20px;
      padding: 10px 16px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.2s, border 0.2s;
      width: 100%;
    }
    .btn-new-chat:hover { background: #3f3f46; }
    .history, .filelist {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 280px;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .history::-webkit-scrollbar, .filelist::-webkit-scrollbar { width: 4px; }
    .history::-webkit-scrollbar-thumb, .filelist::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
    .history button {
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      background: transparent;
      color: var(--muted);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.2s, color 0.2s;
    }
    .history button:hover { background: var(--panel); color: var(--ink); }
    .history button.active-thread { background: var(--panel); color: var(--ink); }
    .filelist li {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 6px 8px;
      border-radius: 8px;
    }
    .filelist li:hover { background: var(--panel); }
    .filelist label {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      cursor: pointer;
    }
    .filelist span {
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .main {
      padding: 26px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    .thread {
      background: transparent;
      border: none;
      padding: 18px 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .message {
      background: transparent;
      border: none;
      padding: 0;
      margin-bottom: 0;
      min-width: 0;
      width: 100%;
    }
    .meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .query {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--ink);
      white-space: pre-wrap;
    }
    .answer {
      line-height: 1.7;
      font-size: 15px;
      color: #d4d4d8;
      white-space: normal;
    }
    .answer pre {
      background: #0f1115;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      overflow-x: auto;
      margin: 12px 0;
    }
    .answer code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      background: rgba(255,255,255,0.1);
      padding: 2px 4px;
      border-radius: 4px;
    }
    .answer pre code { background: transparent; padding: 0; }
    .answer p { margin: 0 0 12px 0; }
    .answer p:last-child { margin-bottom: 0; }
    .sources {
      margin-top: 16px;
      margin-bottom: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      width: 100%;
      padding-bottom: 4px;
    }
    .source-card {
      flex: 1 1 160px;
      max-width: 240px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: background 0.2s;
    }
    .source-card:hover { background: var(--panel-2); }
    .sc-header {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      min-width: 0;
    }
    .sc-favicon {
      flex-shrink: 0;
      border-radius: 2px;
      margin-top: 1px;
      width: 16px;
      height: 16px;
    }
    .source-card a {
      flex: 1;
      min-width: 0;
      color: var(--ink);
      text-decoration: none;
      font-weight: 500;
      font-size: 13px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .source-card p {
      margin: 4px 0 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .source-card details { margin-top: 6px; }
    .source-card details summary {
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
    }
    .source-card details p {
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin: 4px 0 0 0;
    }
    /* Streaming cursor */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor-blink {
      display: inline-block;
      animation: blink 0.9s step-end infinite;
      color: var(--muted);
      margin-left: 1px;
    }
    /* Confidence badge */
    .confidence-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 11px;
      font-weight: 500;
      margin-top: 8px;
    }
    .confidence-high { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
    .confidence-mid  { background: rgba(234,179,8,0.12);  color: #facc15; border: 1px solid rgba(234,179,8,0.25); }
    .confidence-low  { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    /* Copy button */
    .copy-btn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: var(--panel-2); color: var(--ink); }
    .copy-btn svg { flex-shrink: 0; }
    /* Mode chips */
    .mode-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      align-items: center;
    }
    .mode-chip {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .mode-chip:hover { background: var(--panel-2); color: var(--ink); }
    .mode-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    /* Voice button */
    .voice-btn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .voice-btn:hover { background: var(--panel-2); }
    .voice-btn svg { width: 14px; height: 14px; }
    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }
    .voice-btn.recording {
      border-color: #ef4444;
      color: #ef4444;
      animation: pulse-red 1s ease infinite;
    }
    /* Composer */
    .composer {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    textarea {
      width: 100%;
      min-height: 56px;
      max-height: 200px;
      resize: none;
      border: none;
      background: transparent;
      color: var(--ink);
      padding: 0;
      font-size: 15px;
      font-family: inherit;
    }
    textarea:focus { outline: none; }
    textarea::placeholder { color: #52525b; }
    .composer:focus-within { border-color: #52525b; }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .sidebar button.secondary {
      background: transparent;
      color: var(--muted);
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .sidebar button.secondary:hover { background: var(--panel); color: var(--ink); }
    .sidebar button.primary-small {
      background: var(--panel-2);
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .sidebar button.primary-small:hover { background: #3f3f46; }
    button {
      border: 0;
      border-radius: 20px;
      background: var(--ink);
      color: var(--bg);
      padding: 8px 16px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary {
      background: var(--panel-2);
      color: var(--ink);
      border: 1px solid var(--line);
    }
    #uploadStatus {
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
    }
    #status {
      color: var(--muted);
      font-size: 12px;
      min-height: 16px;
    }
    .error { color: var(--error); }
    .citation-chip {
      display: inline-block;
      background: var(--line);
      color: #9cd8ff;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      text-decoration: none;
      margin: 0 3px;
      vertical-align: middle;
      border: 1px solid var(--line);
      transition: background 0.2s;
    }
    .citation-chip:hover { background: var(--panel-2); }
    .settings-container {
      margin-top: auto;
      position: relative;
    }
    .settings-menu {
      position: absolute;
      bottom: 100%;
      left: 0;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: none;
      box-shadow: var(--shadow);
      z-index: 100;
    }
    .settings-menu.open {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .settings-menu .filelist { max-height: 120px; }
    .btn-icon {
      background: transparent;
      color: var(--muted);
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
      transition: background 0.2s, color 0.2s;
    }
    .btn-icon:hover { background: var(--panel); color: var(--ink); }
    .composer-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .composer-tools input[type="file"] { display: none; }
    .composer-upload-btn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .composer-upload-btn:hover { background: var(--panel-2); }
    .composer-upload-btn svg { width: 14px; height: 14px; }
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .auth-card {
      width: min(400px, 95vw);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .auth-card h2 { margin: 0 0 12px 0; font-size: 20px; font-weight: 500; }
    .auth-card p  { margin: 0 0 20px 0; color: var(--muted); font-size: 14px; }
    .auth-card input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg);
      color: var(--ink);
      padding: 12px;
      font: inherit;
      margin-bottom: 16px;
    }
    .auth-card button { width: 100%; }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .main   { order: 1; padding: 16px; }
      .sidebar { order: 2; border-right: 0; border-top: 1px solid var(--line); padding: 16px; }
      .thread  { max-height: 56vh; }
      .composer { position: sticky; bottom: 12px; z-index: 10; }
    }
  </style>
</head>
<body>
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
      <h2>Protected Workspace</h2>
      <p>Enter password to access this instance.</p>
      <input id="passwordInput" type="password" placeholder="Password" />
      <div class="row">
        <button onclick="login()">Login</button>
      </div>
      <div id="authStatus" class="hint"></div>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar">
      <div>
        <h1 class="brand">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
          Perplexio
        </h1>
        <p class="hint">Search + Grounded QA</p>
      </div>

      <button class="btn-new-chat" onclick="newChat()">
        New Thread
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>

      <div class="panel">
        <h3>Library</h3>
        <ul id="history" class="history"></ul>
        <div class="row" style="margin-top:4px;">
          <button class="secondary" onclick="loadChats()">Refresh</button>
          <button class="secondary" onclick="exportThread()">Export</button>
          <button class="secondary" onclick="purgeAllData()">Delete All</button>
        </div>
      </div>

      <div class="settings-container" id="settingsContainer">
        <button class="btn-icon" onclick="toggleSettings()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </button>
        <div id="settingsMenu" class="settings-menu panel">
          <h3>System</h3>
          <div class="row">
            <button class="secondary" onclick="loadJobs()">Jobs</button>
            <button class="secondary" onclick="loadBackups()">Backups</button>
            <button class="secondary" onclick="createBackup()">Backup DB</button>
            <button class="secondary" onclick="logout()">Logout</button>
          </div>
          <ul id="jobList" class="filelist"></ul>
          <ul id="backupList" class="filelist"></ul>
          <h3>Knowledge (Uploaded)</h3>
          <div class="row" style="margin-bottom:4px;">
            <button class="secondary" onclick="saveThreadFiles()">Link checks</button>
          </div>
          <ul id="fileList" class="filelist"></ul>
        </div>
      </div>
    </aside>
    <main class="main">
      <section id="thread" class="thread"></section>
      <section class="composer">
        <textarea id="q" placeholder="Ask the web, your uploaded docs, or both..."></textarea>
        <div class="composer-tools">
          <label class="composer-upload-btn" style="cursor:pointer;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            Attach
            <input id="fileInput" type="file" onchange="upload()" />
          </label>
          <button id="voiceBtn" class="voice-btn" onclick="toggleVoice()" title="Voice input" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <div id="uploadStatus"></div>
          <div id="fileSelectionStatus" class="hint"></div>
          <div style="flex:1;"></div>
          <div class="mode-chips" id="modeChips">
            <button class="mode-chip active" data-mode="auto"   onclick="setMode(this)">Auto</button>
            <button class="mode-chip"        data-mode="web"    onclick="setMode(this)">Web</button>
            <button class="mode-chip"        data-mode="files"  onclick="setMode(this)">Files</button>
            <button class="mode-chip"        data-mode="social" onclick="setMode(this)">Social</button>
            <button class="mode-chip"        data-mode="all"    onclick="setMode(this)">All</button>
          </div>
          <button id="askBtn" onclick="ask()" style="border-radius:8px;padding:6px 16px;font-size:13px;">Ask</button>
        </div>
        <div id="status"></div>
      </section>
    </main>
  </div>
  <template id="welcomeTpl">
    <div class="message">
      <div class="meta">Ready</div>
      <div class="answer">Ask a question to start. Upload text/PDF files to include local context.</div>
    </div>
  </template>
  <script>
    /* ── state ── */
    let activeThreadId = null;
    let activeChatId   = null;
    const selectedFileIds = new Set();
    let allFiles = [];
    let authEnabled = false;
    let jobsPollTimer = null;
    let recognition   = null;
    let recognizing   = false;
    let _msgCounter   = 0;

    /* ── PWA ── */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }

    /* ── settings toggle ── */
    function toggleSettings() {
      document.getElementById("settingsMenu").classList.toggle("open");
    }

    /* ── voice input ── */
    function setupVoice() {
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRec) return;
      recognition = new SpeechRec();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = "en-US";
      recognition.onresult = (ev) => {
        let t = "";
        for (let i = ev.resultIndex; i < ev.results.length; i++) t += ev.results[i][0].transcript;
        const el = document.getElementById("q");
        el.value = t;
        el.style.height = "auto";
        el.style.height = el.scrollHeight + "px";
      };
      recognition.onend = () => {
        recognizing = false;
        document.getElementById("voiceBtn").classList.remove("recording");
      };
      recognition.onerror = () => {
        recognizing = false;
        document.getElementById("voiceBtn").classList.remove("recording");
      };
      document.getElementById("voiceBtn").style.display = "";
    }
    function toggleVoice() {
      if (!recognition) return;
      if (recognizing) {
        recognition.stop();
      } else {
        recognition.start();
        recognizing = true;
        document.getElementById("voiceBtn").classList.add("recording");
      }
    }

    /* ── search mode chips ── */
    function setMode(btn) {
      document.querySelectorAll(".mode-chip").forEach(c => c.classList.remove("active"));
      btn.classList.add("active");
    }
    function getSearchMode() {
      const active = document.querySelector(".mode-chip.active");
      return active ? active.dataset.mode : "auto";
    }
    function resetModeChips() {
      document.querySelectorAll(".mode-chip").forEach(c => c.classList.remove("active"));
      const auto = document.querySelector(".mode-chip[data-mode='auto']");
      if (auto) auto.classList.add("active");
    }

    /* ── helpers ── */
    function formatTime(iso) {
      const d = new Date(iso);
      return Number.isNaN(d.getTime()) ? (iso || "") : d.toLocaleString();
    }
    function getDomainFromUrl(url) {
      try { return new URL(url).hostname; } catch { return ""; }
    }
    function truncate(s, n = 70) {
      if (!s) return "";
      return s.length <= n ? s : s.slice(0, n - 1) + "…";
    }
    function sortedSelectedFileIds() {
      return Array.from(selectedFileIds).sort((a, b) => a - b);
    }
    function uniqueMsgId() {
      return "msg-" + (++_msgCounter) + "-" + Math.floor(Math.random() * 99999);
    }

    /* ── status helpers ── */
    function setStatus(text, isError = false) {
      const el = document.getElementById("status");
      el.textContent = text || "";
      el.className = isError ? "error" : "";
    }
    function setUploadStatus(text, isError = false) {
      const el = document.getElementById("uploadStatus");
      el.textContent = text || "";
      el.className = isError ? "error" : "";
    }
    function setFileSelectionStatus(text, isError = false) {
      const el = document.getElementById("fileSelectionStatus");
      el.textContent = text || "";
      el.className = isError ? "hint error" : "hint";
    }
    function setAuthStatus(text, isError = false) {
      const el = document.getElementById("authStatus");
      el.textContent = text || "";
      el.className = isError ? "hint error" : "hint";
    }

    /* ── auth ── */
    function showAuthOverlay(show) {
      document.getElementById("authOverlay").style.display = show ? "flex" : "none";
    }
    async function apiFetch(url, options = {}) {
      const res = await fetch(url, options);
      if (res.status === 401) { showAuthOverlay(true); throw new Error("Unauthorized"); }
      return res;
    }
    async function ensureAuth() {
      const res = await fetch("/auth/me");
      if (!res.ok) throw new Error("Auth check failed");
      const data = await res.json();
      authEnabled = !!data.auth_enabled;
      showAuthOverlay(authEnabled && !data.authenticated);
      return data;
    }
    async function login() {
      const input = document.getElementById("passwordInput");
      setAuthStatus("Signing in…");
      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: input.value })
        });
        if (!res.ok) throw new Error(await res.text());
        showAuthOverlay(false);
        input.value = "";
        setAuthStatus("");
        await initializeApp();
      } catch (err) {
        setAuthStatus("Login failed: " + err.message, true);
      }
    }
    async function logout() {
      await fetch("/auth/logout", { method: "POST" });
      if (jobsPollTimer !== null) { clearInterval(jobsPollTimer); jobsPollTimer = null; }
      if (authEnabled) showAuthOverlay(true);
    }

    /* ── marked / highlight config ── */
    marked.setOptions({
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
        return hljs.highlightAuto(code).value;
      },
      breaks: true
    });

    /* ── answer rendering ── */
    function setAnswerContent(answerEl, text, citations) {
      answerEl.innerHTML = "";
      // Strip legacy confidence suffix that may exist in stored answers
      let processed = String(text || "").replace(/\n\n\(Confidence:\s*\d+\.\d+\)\s*$/, "");
      // Normalise escaped newlines
      processed = processed.replace(/\\n/g, "\n");

      // Resolve the parent message ID for namespaced anchor links
      const parentMsg = answerEl.closest("article.message");
      const msgId = parentMsg ? (parentMsg.id || "msg") : "msg";

      // Replace [N] citation references with clickable chips
      processed = processed.replace(/\[(\d+)\]/g, (match, numStr) => {
        const n = Number(numStr);
        let label = `[${n}]`;
        if (citations && citations[n - 1] && citations[n - 1].url) {
          try { label = new URL(citations[n - 1].url).hostname.replace("www.", ""); } catch {}
        }
        const anchorId = `${msgId}-src-${n}`;
        return `<a href="#${anchorId}" class="citation-chip" onclick="event.preventDefault();` +
          `const c=document.getElementById('${anchorId}');` +
          `if(c){c.scrollIntoView({behavior:'smooth',block:'center'});` +
          `c.style.outline='1px solid #5da3ff';setTimeout(()=>{c.style.outline=''},1200);}">${label}</a>`;
      });

      answerEl.innerHTML = marked.parse(processed);
    }

    /* ── confidence badge ── */
    function makeConfidenceBadge(confidence) {
      const badge = document.createElement("div");
      badge.className = "confidence-badge";
      const pct = Math.round(confidence * 100);
      if (confidence >= 0.7)      badge.classList.add("confidence-high");
      else if (confidence >= 0.4) badge.classList.add("confidence-mid");
      else                        badge.classList.add("confidence-low");
      badge.textContent = pct + "% confident";
      return badge;
    }

    /* ── copy button ── */
    function addCopyButton(msg, rawText) {
      const existing = msg.querySelector(".copy-btn");
      if (existing) existing.remove();
      const btn = document.createElement("button");
      btn.className = "copy-btn";
      btn.innerHTML =
        `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">` +
        `<rect x="9" y="9" width="13" height="13" rx="2"/>` +
        `<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
      btn.title = "Copy answer";
      btn.onclick = async () => {
        try {
          await navigator.clipboard.writeText(rawText);
          btn.textContent = "✓ Copied";
          setTimeout(() => {
            btn.innerHTML =
              `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">` +
              `<rect x="9" y="9" width="13" height="13" rx="2"/>` +
              `<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
          }, 2000);
        } catch {}
      };
      msg.appendChild(btn);
    }

    /* ── source card builder (with favicons) ── */
    function buildSourcesEl(citations, msgId) {
      const wrap = document.createElement("div");
      wrap.className = "sources";
      citations.forEach((c, i) => {
        const card = document.createElement("div");
        card.className = "source-card";
        card.id = `${msgId}-src-${i + 1}`;

        // Favicon + title row
        const header = document.createElement("div");
        header.className = "sc-header";
        const domain = getDomainFromUrl(c.url);
        if (domain) {
          const img = document.createElement("img");
          img.className = "sc-favicon";
          img.src = `https://www.google.com/s2/favicons?sz=16&domain=${domain}`;
          img.width = 16; img.height = 16;
          img.onerror = function () { this.style.display = "none"; };
          header.appendChild(img);
        }
        const link = document.createElement("a");
        link.href = c.url; link.target = "_blank"; link.rel = "noreferrer";
        link.textContent = `[${i + 1}] ${c.title || c.url}`;
        header.appendChild(link);
        card.appendChild(header);

        // Domain line
        if (domain) {
          const p = document.createElement("p");
          p.textContent = domain;
          card.appendChild(p);
        }

        // Snippet (collapsible)
        if (c.snippet) {
          const details = document.createElement("details");
          const summary = document.createElement("summary");
          summary.textContent = "snippet";
          details.appendChild(summary);
          const sp = document.createElement("p");
          sp.textContent = c.snippet;
          details.appendChild(sp);
          card.appendChild(details);
        }

        wrap.appendChild(card);
      });
      return wrap;
    }

    function appendSources(target, citations) {
      if (!Array.isArray(citations) || citations.length === 0) return;
      const msg = target.closest("article.message") || target;
      const msgId = msg.id || "msg";
      target.appendChild(buildSourcesEl(citations, msgId));
    }

    /* ── SSE parser ── */
    function parseSseBlock(block) {
      const lines = block.split("\n");
      let event = "message";
      let data = "";
      for (const line of lines) {
        if (line.startsWith("event:")) event = line.slice(6).trim();
        else if (line.startsWith("data:")) data += line.slice(5).trim();
      }
      if (!data) return null;
      try { return { event, payload: JSON.parse(data) }; } catch { return null; }
    }

    /* ── reset composer ── */
    function resetComposer() {
      const q = document.getElementById("q");
      q.value = "";
      q.style.height = "56px";
      resetModeChips();
      document.getElementById("fileInput").value = "";
      setUploadStatus("");
      setStatus("");
    }

    /* ── render a complete message (used for history loading) ── */
    function renderMessage(query, answer, citations, metaText) {
      const thread = document.getElementById("thread");
      const msg = document.createElement("article");
      msg.className = "message";
      msg.id = uniqueMsgId();

      const metaEl = document.createElement("div");
      metaEl.className = "meta";
      metaEl.textContent = metaText || "";
      msg.appendChild(metaEl);

      const qEl = document.createElement("div");
      qEl.className = "query";
      qEl.textContent = query;
      msg.appendChild(qEl);

      const aEl = document.createElement("div");
      aEl.className = "answer";

      // Detect and strip legacy confidence suffix, show as badge
      const confMatch = String(answer || "").match(/\n\n\(Confidence:\s*(\d+\.\d+)\)\s*$/);
      const legacyConf = confMatch ? parseFloat(confMatch[1]) : null;

      msg.appendChild(aEl);
      setAnswerContent(aEl, answer || "", citations || []);
      appendSources(msg, citations || []);

      if (legacyConf !== null) {
        msg.appendChild(makeConfidenceBadge(legacyConf));
      }
      addCopyButton(msg, String(answer || "").replace(/\n\n\(Confidence:\s*\d+\.\d+\)\s*$/, ""));

      thread.appendChild(msg);
      thread.scrollTop = thread.scrollHeight;
      return { msg, answerEl: aEl };
    }

    /* ── clear thread ── */
    function clearThread() {
      const thread = document.getElementById("thread");
      thread.innerHTML = "";
      thread.appendChild(document.getElementById("welcomeTpl").content.cloneNode(true));
    }
    function clearThreadEmpty() {
      document.getElementById("thread").innerHTML = "";
    }

    /* ── streaming ask ── */
    async function ask() {
      const qEl  = document.getElementById("q");
      const q    = qEl.value.trim();
      if (!q) return;

      const askBtn = document.getElementById("askBtn");
      if (askBtn) { askBtn.disabled = true; }

      const fileIds    = sortedSelectedFileIds();
      const searchMode = getSearchMode();

      if (activeThreadId === null) clearThreadEmpty();

      // Build message article up-front
      const thread = document.getElementById("thread");
      const msg   = document.createElement("article");
      msg.className = "message";
      msg.id = uniqueMsgId();

      const metaEl = document.createElement("div");
      metaEl.className = "meta";
      metaEl.textContent = "thinking…";
      msg.appendChild(metaEl);

      const qDisplay = document.createElement("div");
      qDisplay.className = "query";
      qDisplay.textContent = q;
      msg.appendChild(qDisplay);

      const answerEl = document.createElement("div");
      answerEl.className = "answer";
      answerEl.innerHTML = '<span class="cursor-blink">▍</span>';
      msg.appendChild(answerEl);

      thread.appendChild(msg);
      thread.scrollTop = thread.scrollHeight;

      // Clear textarea immediately
      qEl.value = "";
      qEl.style.height = "56px";

      setStatus("Searching the web…");

      let streamedText  = "";
      let citationList  = [];
      let sourcesInDom  = false;
      let gotDone       = false;
      let rafPending    = false;

      try {
        const res = await apiFetch("/api/ask/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query: q,
            include_files: true,
            thread_id: activeThreadId,
            file_ids: fileIds,
            search_mode: searchMode
          })
        });
        if (!res.ok) throw new Error(await res.text());

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buf += decoder.decode(value, { stream: true });
          const parts = buf.split("\n\n");
          buf = parts.pop(); // last may be incomplete

          for (const block of parts) {
            if (!block.trim()) continue;
            const ev = parseSseBlock(block);
            if (!ev) continue;

            if (ev.event === "meta") {
              citationList = ev.payload.citations || [];
              metaEl.textContent = new Date().toLocaleTimeString();
              setStatus("Generating answer…");
              // Render sources BEFORE the answer (Perplexity-style)
              if (citationList.length > 0 && !sourcesInDom) {
                sourcesInDom = true;
                const sourcesDiv = buildSourcesEl(citationList, msg.id);
                // Insert between qDisplay and answerEl
                msg.insertBefore(sourcesDiv, answerEl);
              }
              // Clear placeholder cursor, ready for tokens
              answerEl.innerHTML = '<span class="cursor-blink">▍</span>';

            } else if (ev.event === "token") {
              streamedText += ev.payload.delta || "";
              // Batch DOM updates to animation frames for smooth rendering
              if (!rafPending) {
                rafPending = true;
                requestAnimationFrame(() => {
                  answerEl.textContent = streamedText + " ▍";
                  thread.scrollTop = thread.scrollHeight;
                  rafPending = false;
                });
              }

            } else if (ev.event === "done") {
              gotDone = true;
              activeThreadId = ev.payload.thread_id;
              activeChatId   = ev.payload.chat_id;
              const confidence = parseFloat(ev.payload.confidence || 0);

              // Final markdown render
              setAnswerContent(answerEl, streamedText, citationList);

              // Confidence badge
              if (confidence > 0) {
                msg.insertBefore(makeConfidenceBadge(confidence), answerEl.nextSibling);
              }
              addCopyButton(msg, streamedText);

              setFileSelectionStatus(`${selectedFileIds.size} file(s) attached to thread #${activeThreadId}`);
              setStatus(`Saved to thread #${activeThreadId} (chat #${activeChatId})`);
              await loadChats();
              // Highlight active thread in sidebar
              highlightActiveThread(activeThreadId);

            } else if (ev.event === "final") {
              // Citation-aligned version arrived — re-render
              const aligned = ev.payload.answer || "";
              streamedText = aligned;
              setAnswerContent(answerEl, aligned, citationList);

            } else if (ev.event === "error") {
              throw new Error(ev.payload.detail || "Stream error");
            }
          }
        }

        if (!gotDone && streamedText) {
          // Stream ended without done event — render what we have
          setAnswerContent(answerEl, streamedText, citationList);
          addCopyButton(msg, streamedText);
          setStatus("", false);
        }

      } catch (err) {
        answerEl.innerHTML = `<span style="color:var(--error)">Error: ${err.message}</span>`;
        setStatus("Request failed: " + err.message, true);
      } finally {
        if (askBtn) { askBtn.disabled = false; }
      }
    }

    /* ── file upload ── */
    async function upload() {
      const input = document.getElementById("fileInput");
      if (!input.files || input.files.length === 0) { setUploadStatus("Choose a file first."); return; }
      const form = new FormData();
      form.append("file", input.files[0]);
      setUploadStatus("Uploading…");
      try {
        const res  = await apiFetch("/api/files/upload", { method: "POST", body: form });
        const text = await res.text();
        if (!res.ok) throw new Error(text);
        const data = JSON.parse(text);
        const jobTxt = data.job_id ? `, job #${data.job_id}` : "";
        setUploadStatus(`Uploaded: ${data.filename} (#${data.file_id}${jobTxt})`);
        input.value = "";
        if (data.file_id) selectedFileIds.add(data.file_id);
        await loadFiles();
        await loadJobs();
        setFileSelectionStatus(
          activeThreadId === null
            ? `${selectedFileIds.size} file(s) selected for next new thread`
            : `${selectedFileIds.size} file(s) attached to thread #${activeThreadId}`
        );
      } catch (err) {
        setUploadStatus("Upload failed: " + err.message, true);
      }
    }

    /* ── sidebar helpers ── */
    function highlightActiveThread(threadId) {
      document.querySelectorAll("#history button").forEach(btn => {
        btn.classList.toggle("active-thread", btn.dataset.threadId == threadId);
      });
    }

    async function loadChats() {
      const history = document.getElementById("history");
      history.innerHTML = "";
      try {
        const res = await apiFetch("/api/chats?limit=40");
        if (!res.ok) throw new Error(await res.text());
        const chats = await res.json();
        chats.forEach(chat => {
          const li  = document.createElement("li");
          const btn = document.createElement("button");
          btn.dataset.threadId = chat.thread_id;
          btn.textContent = truncate(chat.title || chat.query || "(empty)");
          if (chat.thread_id == activeThreadId) btn.classList.add("active-thread");
          btn.onclick = () => loadThread(chat.thread_id);
          li.appendChild(btn);
          history.appendChild(li);
        });
      } catch (err) {
        const li = document.createElement("li");
        li.textContent = "Failed to load chats";
        history.appendChild(li);
      }
    }

    async function loadFiles() {
      try {
        const res = await apiFetch("/api/files?limit=50");
        if (!res.ok) throw new Error(await res.text());
        allFiles = await res.json();
        renderFiles();
      } catch (_err) {
        const fl = document.getElementById("fileList");
        fl.innerHTML = "";
        const li = document.createElement("li");
        li.textContent = "Failed to load files";
        fl.appendChild(li);
      }
    }

    function renderFiles() {
      const fileList = document.getElementById("fileList");
      fileList.innerHTML = "";
      allFiles.forEach(file => {
        const li    = document.createElement("li");
        const label = document.createElement("label");
        const cb    = document.createElement("input");
        cb.type    = "checkbox";
        cb.checked = selectedFileIds.has(file.id);
        cb.onchange = () => {
          if (cb.checked) selectedFileIds.add(file.id);
          else            selectedFileIds.delete(file.id);
          setFileSelectionStatus(
            activeThreadId === null
              ? `${selectedFileIds.size} file(s) selected for next new thread`
              : `${selectedFileIds.size} file(s) selected for thread #${activeThreadId} (click Save to persist)`
          );
        };
        const text = document.createElement("span");
        text.textContent = `${file.original_name} (${Math.ceil(file.size_bytes / 1024)} KB)`;
        label.appendChild(cb);
        label.appendChild(text);
        li.appendChild(label);
        fileList.appendChild(li);
      });
    }

    async function loadThread(threadId) {
      setStatus("Loading thread…");
      try {
        const res = await apiFetch(`/api/threads/${threadId}`);
        if (!res.ok) throw new Error(await res.text());
        const payload = await res.json();
        activeThreadId = payload.thread_id;
        selectedFileIds.clear();
        (payload.attached_file_ids || []).forEach(fid => selectedFileIds.add(fid));
        renderFiles();
        clearThreadEmpty();
        payload.chats.forEach(turn => {
          renderMessage(turn.query, turn.answer, turn.citations || [], formatTime(turn.created_at));
          activeChatId = turn.id;
        });
        highlightActiveThread(activeThreadId);
        setFileSelectionStatus(`${selectedFileIds.size} file(s) attached to thread #${payload.thread_id}`);
        setStatus(`Loaded thread #${payload.thread_id}`);
      } catch (_err) {
        setStatus("Failed to load thread", true);
      }
    }

    async function saveThreadFiles() {
      if (activeThreadId === null) {
        setFileSelectionStatus("Ask first to create a thread, then save attachments.", true);
        return;
      }
      try {
        const res = await apiFetch(`/api/threads/${activeThreadId}/files`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ file_ids: sortedSelectedFileIds() })
        });
        if (!res.ok) throw new Error(await res.text());
        const p = await res.json();
        selectedFileIds.clear();
        (p.file_ids || []).forEach(fid => selectedFileIds.add(fid));
        renderFiles();
        setFileSelectionStatus(`${selectedFileIds.size} file(s) saved to thread #${activeThreadId}`);
      } catch (err) {
        setFileSelectionStatus("Failed to save selection: " + err.message, true);
      }
    }

    function newChat() {
      activeThreadId = null;
      activeChatId   = null;
      selectedFileIds.clear();
      renderFiles();
      clearThread();
      resetComposer();
      highlightActiveThread(null);
      setFileSelectionStatus("No thread selected. File choices apply to the next ask.");
      setStatus("New chat ready");
    }

    async function exportThread() {
      if (activeThreadId === null) { setStatus("No active thread to export.", true); return; }
      window.open(`/api/threads/${activeThreadId}/export?format=markdown`, "_blank", "noopener,noreferrer");
    }

    async function purgeAllData() {
      if (!window.confirm("Delete all chats and uploaded files from this instance?")) return;
      setStatus("Purging data…");
      try {
        const res = await apiFetch("/api/admin/purge", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ confirm: true })
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        activeThreadId = null; activeChatId = null;
        selectedFileIds.clear(); allFiles = [];
        resetComposer(); clearThread();
        await loadChats(); await loadFiles();
        setFileSelectionStatus("No thread selected. File choices apply to the next ask.");
        setStatus(`Purged chats=${data.deleted_chat_count}, files=${data.deleted_file_count}, chunks=${data.deleted_chunk_count}`);
      } catch (err) {
        setStatus("Purge failed: " + err.message, true);
      }
    }

    async function loadJobs() {
      const list = document.getElementById("jobList");
      list.innerHTML = "";
      try {
        const res = await apiFetch("/api/jobs?limit=10");
        if (!res.ok) throw new Error(await res.text());
        const jobs = await res.json();
        if (jobs.length === 0) {
          const li = document.createElement("li"); li.textContent = "No jobs yet"; list.appendChild(li);
          return;
        }
        jobs.forEach(j => {
          const li = document.createElement("li");
          li.textContent = `#${j.id} ${j.job_type} ${j.status} ${Math.round((j.progress || 0) * 100)}%`;
          list.appendChild(li);
        });
      } catch (_err) {
        const li = document.createElement("li"); li.textContent = "Failed to load jobs"; list.appendChild(li);
      }
    }

    async function loadBackups() {
      const list = document.getElementById("backupList");
      list.innerHTML = "";
      try {
        const res = await apiFetch("/api/admin/backups");
        if (!res.ok) throw new Error(await res.text());
        const backups = await res.json();
        if (backups.length === 0) {
          const li = document.createElement("li"); li.textContent = "No backups yet"; list.appendChild(li);
          return;
        }
        backups.forEach(b => {
          const li   = document.createElement("li");
          const wrap = document.createElement("div");
          wrap.style.cssText = "display:flex;gap:6px;align-items:center;";
          const name = document.createElement("span");
          name.textContent = `${b.name} (${Math.ceil(b.size_bytes / 1024)} KB)`;
          const dl = document.createElement("button"); dl.className = "secondary"; dl.textContent = "DL";
          dl.onclick = () => window.open(`/api/admin/backups/${encodeURIComponent(b.name)}/download`, "_blank");
          const rs = document.createElement("button"); rs.className = "secondary"; rs.textContent = "Restore";
          rs.onclick = async () => {
            if (!window.confirm(`Restore backup ${b.name}? This overwrites current DB.`)) return;
            const r = await apiFetch(`/api/admin/backups/${encodeURIComponent(b.name)}/restore`, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ confirm: true })
            });
            if (!r.ok) throw new Error(await r.text());
            setStatus(`Restored backup ${b.name}. Reloading…`);
            setTimeout(() => window.location.reload(), 1200);
          };
          wrap.append(name, dl, rs);
          li.appendChild(wrap);
          list.appendChild(li);
        });
      } catch (_err) {
        const li = document.createElement("li"); li.textContent = "Failed to load backups"; list.appendChild(li);
      }
    }

    async function createBackup() {
      setStatus("Creating backup…");
      try {
        const res = await apiFetch("/api/admin/backups/create", { method: "POST" });
        if (!res.ok) throw new Error(await res.text());
        const b = await res.json();
        setStatus(`Backup created: ${b.name}`);
        await loadBackups();
      } catch (err) {
        setStatus("Backup failed: " + err.message, true);
      }
    }

    /* ── keyboard shortcut ── */
    const queryInput = document.getElementById("q");
    queryInput.addEventListener("input", function () {
      this.style.height = "auto";
      this.style.height = (this.scrollHeight) + "px";
      if (this.value === "") this.style.height = "56px";
    });
    queryInput.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter" && !ev.shiftKey) { ev.preventDefault(); ask(); }
    });

    /* ── init ── */
    async function initializeApp() {
      clearThread();
      resetComposer();
      await loadChats();
      await loadFiles();
      await loadJobs();
      await loadBackups();
      setFileSelectionStatus("No thread selected. File choices apply to the next ask.");
      setupVoice();
      if (jobsPollTimer === null) {
        jobsPollTimer = setInterval(() => { loadJobs(); }, 5000);
      }
    }

    ensureAuth().then((info) => {
      if (!info.auth_enabled || info.authenticated) initializeApp();
    }).catch(() => {
      setStatus("Initialization failed.", true);
    });
  </script>
</body>
</html>
