services:
  perplexio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: perplexio
    env_file:
      - .env
    environment:
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://gen.pollinations.ai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-openai}
      - SONAR_MODEL=${SONAR_MODEL:-perplexity-fast}
      - DATA_DIR=${DATA_DIR:-/data}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped
